version: '3.8'
services:
  api:
    build: .
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/workspace
    working_dir: /workspace
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ea
      - EA_API_TOKEN=devtoken
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ea
    ports:
      - "5432:5432"

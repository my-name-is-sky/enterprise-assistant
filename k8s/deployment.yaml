apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-assistant
  template:
    metadata:
      labels:
        app: enterprise-assistant
    spec:
      containers:
        - name: api
          image: enterprise-assistant:latest
          ports:
            - containerPort: 8000
          env:
            - name: EA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ea-secrets
                  key: api-token
